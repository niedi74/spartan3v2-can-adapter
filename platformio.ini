[platformio]
default_envs = motorraum

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200

[env:motorraum]
board = esp32dev
upload_speed = 921600
upload_port = COM16
monitor_port = COM16
board_build.partitions = huge_app.csv
lib_deps =
  marcoschwartz/LiquidCrystal_I2C@^1.1.4
  h2zero/NimBLE-Arduino@^2.2.3
build_flags =
  -D DEVICE_ROLE=\"motorraum\"
  -D STATUS_LED_PIN=2
  -D LCD_I2C_ADDR=0x27
  -D LCD_COLS=16
  -D LCD_ROWS=2
  -D I2C_SDA_PIN=21
  -D I2C_SCL_PIN=22
  -D ENABLE_WEB_GUI=1
  -D WEB_AP_SSID=\"Spartan3-Setup\"
  -D WEB_AP_PASSWORD=\"lambda123\"
  -D HOME_WIFI_SSID=\"Android-AP1\"
  -D HOME_WIFI_PASSWORD=\"Frankfurt1\"
  -D ENABLE_BLE_HUB=1
  -D ENABLE_BLE_DISPLAY=0
  -D ENABLE_ESP_NOW_HUB=1
  -D ESP_NOW_WIFI_CHANNEL=6
  -D BLE_HUB_NAME=\"Spartan3-Hub\"
  -D ENABLE_BM6=1
  -D ENABLE_SPARTAN_CAN=1
  -D CAN_RX_PIN=25
  -D CAN_TX_PIN=26
  -D SPARTAN_CAN_ID=0x400
  -D ENABLE_SPARTAN_DEMO=0
  -D ENABLE_SPARTAN_UART=1
  -D SPARTAN_UART_RX_PIN=16
  -D SPARTAN_UART_TX_PIN=17
  -D ENABLE_SPARTAN_ANALOG=0
  -D SPARTAN_ANALOG_PIN=34
  -D ENABLE_SPARTAN_HEATER_ANALOG=1
  -D SPARTAN_HEATER_PIN=35
  -D SPEED_REED_PIN=27

[env:motorraum_s3_devkitc]
board = esp32s3_120_16_8-qio_opi
upload_speed = 115200
upload_port = COM16
monitor_port = COM16
board_upload.flash_size = 16MB
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
lib_deps =
  marcoschwartz/LiquidCrystal_I2C@^1.1.4
  h2zero/NimBLE-Arduino@^2.2.3
build_flags =
  -D DEVICE_ROLE=\"motorraum_s3\"
  -D ARDUINO_USB_MODE=0
  -D ARDUINO_USB_CDC_ON_BOOT=0
  -D STATUS_LED_PIN=2
  -D LCD_I2C_ADDR=0x27
  -D LCD_COLS=16
  -D LCD_ROWS=2
  -D I2C_SDA_PIN=8
  -D I2C_SCL_PIN=9
  -D ENABLE_WEB_GUI=1
  -D WEB_AP_SSID=\"Spartan3-Setup\"
  -D WEB_AP_PASSWORD=\"lambda123\"
  -D HOME_WIFI_SSID=\"\"
  -D HOME_WIFI_PASSWORD=\"\"
  -D ENABLE_BLE_HUB=1
  -D ENABLE_BLE_DISPLAY=0
  -D ENABLE_ESP_NOW_HUB=1
  -D ESP_NOW_WIFI_CHANNEL=6
  -D BLE_HUB_NAME=\"Spartan3-Hub\"
  -D ENABLE_BM6=1
  -D ENABLE_SPARTAN_CAN=1
  -D CAN_RX_PIN=10
  -D CAN_TX_PIN=11
  -D SPARTAN_CAN_ID=0x400
  -D ENABLE_SPARTAN_DEMO=0
  -D ENABLE_SPARTAN_UART=1
  -D SPARTAN_UART_RX_PIN=16
  -D SPARTAN_UART_TX_PIN=17
  -D ENABLE_SPARTAN_ANALOG=0
  -D SPARTAN_ANALOG_PIN=34
  -D ENABLE_SPARTAN_HEATER_ANALOG=0
  -D SPARTAN_HEATER_PIN=4
  -D SPEED_REED_PIN=12

[env:spartan_uart_test]
board = esp32dev
upload_speed = 921600
upload_port = COM9
monitor_port = COM9
lib_deps =
  marcoschwartz/LiquidCrystal_I2C@^1.1.4
build_flags =
  -D DEVICE_ROLE=\"motorraum\"
  -D STATUS_LED_PIN=2
  -D LCD_I2C_ADDR=0x27
  -D LCD_COLS=16
  -D LCD_ROWS=2
  -D I2C_SDA_PIN=21
  -D I2C_SCL_PIN=22
  -D ENABLE_WEB_GUI=1
  -D WEB_AP_SSID=\"Spartan3-Setup\"
  -D WEB_AP_PASSWORD=\"lambda123\"
  -D HOME_WIFI_SSID=\"Android-AP1\"
  -D HOME_WIFI_PASSWORD=\"Frankfurt1\"
  -D ENABLE_BLE_HUB=0
  -D ENABLE_SPARTAN_CAN=0
  -D ENABLE_SPARTAN_DEMO=0
  -D ENABLE_SPARTAN_UART=1
  -D SPARTAN_UART_RX_PIN=16
  -D SPARTAN_UART_TX_PIN=17
  -D ENABLE_SPARTAN_ANALOG=0

[env:m5_motorraum]
board = m5stack-core-esp32
upload_speed = 921600
lib_deps =
  m5stack/M5Unified@^0.2.0
  h2zero/NimBLE-Arduino@^2.2.3
build_flags =
  -D DEVICE_ROLE=\"motorraum\"
  -D STATUS_LED_PIN=2
  -D USE_M5_DISPLAY=1
  -D ENABLE_WEB_GUI=0
  -D ENABLE_BLE_HUB=0
  -D ENABLE_SPARTAN_CAN=1
  -D CAN_RX_PIN=16
  -D CAN_TX_PIN=17
  -D SPARTAN_CAN_ID=0x400
  -D ENABLE_SPARTAN_DEMO=0
  -D ENABLE_SPARTAN_UART=1
  -D SPARTAN_UART_RX_PIN=26
  -D SPARTAN_UART_TX_PIN=27
  -D ENABLE_SPARTAN_ANALOG=0
  -D SPARTAN_ANALOG_PIN=34
